<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ПВЗ • Трудоустройство</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    
    body { 
      background: radial-gradient(circle at top right, #2e1065, #020617); 
      font-family: 'Inter', sans-serif;
      color-scheme: dark;
    }

    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .step-circle {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 10;
    }

    .progress-bar-bg {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      position: absolute;
      top: 20px;
      left: 0;
      right: 0;
      z-index: 1;
    }

    .progress-bar-fill {
      height: 4px;
      background: #10b981;
      position: absolute;
      top: 20px;
      left: 0;
      width: 0%;
      transition: width 0.5s ease;
      z-index: 2;
    }

    input:focus, textarea:focus {
      box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
    }

    .step-content {
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="glass max-w-xl w-full rounded-[2.5rem] shadow-2xl p-8 md:p-10">
    
    <div class="relative mb-12 px-4">
      <div class="progress-bar-bg"></div>
      <div id="progressFill" class="progress-bar-fill"></div>
      
      <div class="flex justify-between relative">
        <div class="flex flex-col items-center">
          <div id="circle1" class="step-circle bg-emerald-500 text-white shadow-[0_0_15px_rgba(16,185,129,0.4)]">
            <i class="fas fa-user text-sm"></i>
          </div>
          <span class="text-[10px] uppercase tracking-widest mt-2 font-bold text-emerald-400">Инфо</span>
        </div>
        
        <div class="flex flex-col items-center">
          <div id="circle2" class="step-circle bg-white/10 text-white/40">
            <i class="fas fa-file-alt text-sm"></i>
          </div>
          <span class="text-[10px] uppercase tracking-widest mt-2 font-bold text-white/40">Фото</span>
        </div>
        
        <div class="flex flex-col items-center">
          <div id="circle3" class="step-circle bg-white/10 text-white/40">
            <i class="fas fa-credit-card text-sm"></i>
          </div>
          <span class="text-[10px] uppercase tracking-widest mt-2 font-bold text-white/40">Банк</span>
        </div>
      </div>
    </div>

    <form id="regForm">
      <div id="step1" class="step-content">
        <div class="text-center mb-8">
          <h2 class="text-3xl font-bold bg-gradient-to-r from-white to-white/60 bg-clip-text text-transparent">Личные данные</h2>
          <p class="text-white/40 text-sm mt-2">Заполните информацию о себе</p>
        </div>
        <input type="hidden" id="tg_id">
        <div class="space-y-4">
          <div class="relative">
            <i class="fas fa-id-card absolute left-4 top-5 text-white/30"></i>
            <input id="name" type="text" required placeholder="ФИО полностью" 
              class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-5 py-4 focus:outline-none focus:border-emerald-500 transition-all">
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input id="birth" type="date" required class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500 transition-all">
            <input id="phone" type="tel" required placeholder="+7 (___) ___-__-__" 
              class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500 transition-all">
          </div>
          <textarea id="address" rows="3" required placeholder="Адрес проживания" 
            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500 transition-all"></textarea>
        </div>
      </div>

      <div id="step2" class="step-content hidden">
        <div class="text-center mb-8">
          <h2 class="text-3xl font-bold text-white">Документы</h2>
          <p class="text-white/40 text-sm mt-2">Четкие фото оригиналов</p>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div onclick="document.getElementById('passport').click()" class="group cursor-pointer bg-white/5 border-2 border-dashed border-white/10 rounded-2xl p-4 text-center hover:border-emerald-500/50 transition-all">
            <input id="passport" type="file" accept="image/*" class="hidden" onchange="previewFile(this, 'prev_passport')">
            <i class="fas fa-camera text-2xl mb-2 text-white/20 group-hover:text-emerald-400"></i>
            <p class="text-[11px] uppercase font-bold text-white/60">Паспорт</p>
            <img id="prev_passport" class="mt-2 rounded-lg max-h-20 mx-auto hidden border border-white/20">
          </div>
          <div onclick="document.getElementById('propiska').click()" class="group cursor-pointer bg-white/5 border-2 border-dashed border-white/10 rounded-2xl p-4 text-center hover:border-emerald-500/50 transition-all">
            <input id="propiska" type="file" accept="image/*" class="hidden" onchange="previewFile(this, 'prev_propiska')">
            <i class="fas fa-home text-2xl mb-2 text-white/20 group-hover:text-emerald-400"></i>
            <p class="text-[11px] uppercase font-bold text-white/60">Прописка</p>
            <img id="prev_propiska" class="mt-2 rounded-lg max-h-20 mx-auto hidden border border-white/20">
          </div>
          <div onclick="document.getElementById('snils').click()" class="group cursor-pointer bg-white/5 border-2 border-dashed border-white/10 rounded-2xl p-4 text-center hover:border-emerald-500/50 transition-all">
            <input id="snils" type="file" accept="image/*" class="hidden" onchange="previewFile(this, 'prev_snils')">
            <i class="fas fa-address-card text-2xl mb-2 text-white/20 group-hover:text-emerald-400"></i>
            <p class="text-[11px] uppercase font-bold text-white/60">СНИЛС</p>
            <img id="prev_snils" class="mt-2 rounded-lg max-h-20 mx-auto hidden border border-white/20">
          </div>
          <div onclick="document.getElementById('inn').click()" class="group cursor-pointer bg-white/5 border-2 border-dashed border-white/10 rounded-2xl p-4 text-center hover:border-emerald-500/50 transition-all">
            <input id="inn" type="file" accept="image/*" class="hidden" onchange="previewFile(this, 'prev_inn')">
            <i class="fas fa-file-invoice text-2xl mb-2 text-white/20 group-hover:text-emerald-400"></i>
            <p class="text-[11px] uppercase font-bold text-white/60">ИНН</p>
            <img id="prev_inn" class="mt-2 rounded-lg max-h-20 mx-auto hidden border border-white/20">
          </div>
        </div>
      </div>

      <div id="step3" class="step-content hidden">
        <div class="text-center mb-8">
          <h2 class="text-3xl font-bold text-white">Реквизиты</h2>
          <p class="text-white/40 text-sm mt-2">Куда перечислять оплату</p>
        </div>
        <div class="space-y-4">
          <input id="bank_name" type="text" required placeholder="Название банка" 
            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500 transition-all">
          <input id="card_number" type="text" required placeholder="Номер карты или счёта" 
            class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500 transition-all">
        </div>
      </div>

      <div class="flex gap-4 mt-10">
        <button type="button" id="btnBack" onclick="prevStep()" 
          class="flex-1 py-4 rounded-2xl bg-white/5 hover:bg-white/10 font-semibold transition-all hidden border border-white/10">Назад</button>
        <button type="button" id="btnNext" onclick="nextStep()" 
          class="flex-[2] bg-emerald-500 hover:bg-emerald-600 shadow-lg shadow-emerald-500/20 py-4 rounded-2xl font-bold text-white transition-all transform active:scale-[0.98]">
          Далее <i class="fas fa-chevron-right ml-2 text-xs"></i>
        </button>
      </div>
    </form>

    <div id="success" class="hidden text-center py-8">
      <div class="w-24 h-24 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-6">
        <i class="fas fa-check text-4xl"></i>
      </div>
      <h2 class="text-3xl font-bold mb-3">Готово!</h2>
      <p class="text-white/60 leading-relaxed">Ваша анкета успешно отправлена.<br>Мы свяжемся с вами в ближайшее время.</p>
      <a href="https://t.me/ВАШ_БОТ" class="mt-8 inline-block bg-white text-black px-12 py-4 rounded-2xl font-bold hover:bg-gray-200 transition-all">Вернуться</a>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzt49_qlMTS17pDLYrdBG6-DUeqbwYHs_lcITDfYPxCuTLYO1ZEUBIDwmCeF7aM6z4/exec";
    let currentStep = 1;

    function previewFile(input, previewId) {
      const file = input.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => {
          const img = document.getElementById(previewId);
          img.src = e.target.result;
          img.classList.remove("hidden");
        };
        reader.readAsDataURL(file);
      }
    }

    function updateProgress() {
      // Обновление полоски (0%, 50%, 100%)
      const fill = document.getElementById("progressFill");
      fill.style.width = ((currentStep - 1) / 2 * 100) + "%";

      // Обновление кружков
      for (let i = 1; i <= 3; i++) {
        const circle = document.getElementById(`circle${i}`);
        const text = circle.nextElementSibling;
        
        if (i < currentStep) {
          circle.className = "step-circle bg-emerald-500 text-white";
          circle.innerHTML = '<i class="fas fa-check"></i>';
          text.className = "text-[10px] uppercase tracking-widest mt-2 font-bold text-emerald-400";
        } else if (i === currentStep) {
          circle.className = "step-circle bg-emerald-500 text-white shadow-[0_0_15px_rgba(16,185,129,0.4)]";
          circle.innerHTML = getIcon(i);
          text.className = "text-[10px] uppercase tracking-widest mt-2 font-bold text-emerald-400";
        } else {
          circle.className = "step-circle bg-white/10 text-white/40";
          circle.innerHTML = getIcon(i);
          text.className = "text-[10px] uppercase tracking-widest mt-2 font-bold text-white/40";
        }
      }

      document.getElementById("btnBack").classList.toggle("hidden", currentStep === 1);
      document.getElementById("btnNext").innerHTML = currentStep === 3 
        ? 'Отправить анкету <i class="fas fa-paper-plane ml-2"></i>' 
        : 'Далее <i class="fas fa-chevron-right ml-2 text-xs"></i>';
    }

    function getIcon(step) {
      if (step === 1) return '<i class="fas fa-user text-sm"></i>';
      if (step === 2) return '<i class="fas fa-file-alt text-sm"></i>';
      return '<i class="fas fa-credit-card text-sm"></i>';
    }

    function nextStep() {
      if (currentStep < 3) {
        document.getElementById(`step${currentStep}`).classList.add("hidden");
        currentStep++;
        document.getElementById(`step${currentStep}`).classList.remove("hidden");
        updateProgress();
      } else {
        submitForm();
      }
    }

    function prevStep() {
      if (currentStep > 1) {
        document.getElementById(`step${currentStep}`).classList.add("hidden");
        currentStep--;
        document.getElementById(`step${currentStep}`).classList.remove("hidden");
        updateProgress();
      }
    }

    async function submitForm() {
      const btn = document.getElementById("btnNext");
      btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Отправка...`;
      btn.disabled = true;
    
      // Читаем файлы
      const toBase64 = file => new Promise((resolve, reject) => {
        if (!file) resolve(null);
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
  
      try {
        const passportFile = document.getElementById("passport").files[0];
        const propiskaFile = document.getElementById("propiska").files[0];
        const snilsFile = document.getElementById("snils").files[0];
        const innFile = document.getElementById("inn").files[0];
    
        const payload = {
          name: document.getElementById("name").value,
          birth: document.getElementById("birth").value,
          phone: document.getElementById("phone").value,
          address: document.getElementById("address").value,
          bank_name: document.getElementById("bank_name").value,
          card_number: document.getElementById("card_number").value,
          passport: await toBase64(passportFile),
          propiska: await toBase64(propiskaFile),
          snils: await toBase64(snilsFile),
          inn: await toBase64(innFile)
        };
    
        // Отправка через URLSearchParams
        const formData = new URLSearchParams();
        for (const key in payload) { formData.append(key, payload[key]); }
    
        await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          body: formData,
          mode: "no-cors" // Для работы с Apps Script без ошибок CORS
        });
    
        // Показываем успех (так как при no-cors мы не получим JSON ответа, просто ждем 1.5 сек)
        setTimeout(() => {
          document.getElementById("regForm").classList.add("hidden");
          document.querySelector(".relative.mb-12").classList.add("hidden"); 
          document.getElementById("success").classList.remove("hidden");
        }, 1500);
    
      } catch (err) {
        alert("Ошибка связи с сервером. Попробуйте еще раз.");
        btn.disabled = false;
        btn.innerHTML = `Повторить отправку`;
      }
    }
  </script>
</body>
</html>
